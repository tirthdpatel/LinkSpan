min_port=49152
max_port=65535
listening-port=3478
tls-listening-port=5349

# NOTE: coturn does NOT expand shell or `${VAR}` syntax in this file. The public IP
# and the shared secret are injected at container start by
# coturn/docker-entrypoint.sh as `--external-ip` and `--static-auth-secret` CLI
# flags (from the EXTERNAL_IP and TURN_SECRET environment variables). Never put
# `$(...)` or `${...}` here — coturn would take it literally and misconfigure.

# Replace with your domain for TLS
# cert=/etc/letsencrypt/live/turn.example.com/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.example.com/privkey.pem

# Shared secret for REST API auth (rotate regularly) — value supplied via CLI flag.
use-auth-secret

realm=linkspan.example.com

# Security
no-multicast-peers
no-loopback-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255
denied-peer-ip=::1
denied-peer-ip=64:ff9b::-64:ff9b::ffff:ffff

# Logging
log-file=/var/log/turnserver/turn.log
verbose
