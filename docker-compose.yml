services:
  signaling:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "10000:10000"
    environment:
      - PORT=10000
      - CORS_ORIGIN=*
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:10000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
