services:

  # ── Client (Nginx SPA) ──────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      signaling:
        condition: service_healthy
    restart: unless-stopped

  # ── Signaling Server ────────────────────────────────────────
  signaling:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "10000:10000"
    environment:
      - PORT=10000
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - TOKEN_SECRET=${TOKEN_SECRET}
      # ── Share links + REST API (Features 14/15/17) ──
      # Blob bytes on a persistent volume; metadata in Redis (shared across instances).
      - SHARE_STORAGE=filesystem
      - SHARE_STORAGE_DIR=/data/blobs
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      - SHARE_VIEW_URL=${SHARE_VIEW_URL:-}
      # API auth: set API_KEY_SECRET to issue/verify signed keys; disable anonymous
      # link creation in production unless you intend an open public service.
      - API_KEY_SECRET=${API_KEY_SECRET:-${TOKEN_SECRET}}
      - API_ALLOW_ANONYMOUS=${API_ALLOW_ANONYMOUS:-false}
    volumes:
      - blob_data:/data/blobs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Redis (session store) ────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Coturn (TURN server for relay) ───────────────────────────
  coturn:
    image: coturn/coturn:4.6.2-alpine
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"   # TLS
      - "5349:5349/udp"   # DTLS
      - "49152-65535:49152-65535/udp"  # Media relay range
    entrypoint: ["/bin/sh", "/usr/local/bin/coturn-entrypoint.sh"]
    environment:
      # coturn can't expand env in its config — the entrypoint injects these as flags.
      - TURN_SECRET=${TURN_SECRET:?TURN_SECRET is required}
      - EXTERNAL_IP=${EXTERNAL_IP:-}
    volumes:
      - ./coturn/turnserver.conf:/etc/turnserver.conf:ro
      - ./coturn/docker-entrypoint.sh:/usr/local/bin/coturn-entrypoint.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "turnutils_uclient -T 127.0.0.1 && echo ok || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Prometheus (metrics) ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    restart: unless-stopped

  # ── Grafana (dashboards) ─────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3001:3000"
    environment:
      # GRAFANA_PASSWORD must be set in the environment — no default is provided
      # to prevent accidental deployment with a weak password.
      # Generate with: openssl rand -hex 16
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
  blob_data:   # share-link blob storage (Features 14/15)
