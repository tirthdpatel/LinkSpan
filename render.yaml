# ──────────────────────────────────────────────────────────────────────────
# Render Blueprint — LinkSpan signaling server (Free tier, native Node)
#
# Deploy: push this file to your repo, then in the Render dashboard choose
# "New +" → "Blueprint" and point it at the repo. Render reads this file and
# provisions the service. Native Node is used (no Docker build minutes); the
# server has no build step, so we just install deps and run it.
#
# IMPORTANT free-tier notes:
#  • Free web services SLEEP after ~15 min idle and cold-start (~50s) on the
#    next request. The client auto-reconnects, but the first connection after
#    sleep is slow. (Acceptable for a portfolio/college demo.)
#  • Free services have no persistent disk — which is fine here because blob
#    storage lives on Supabase S3, not local disk.
#  • WebSockets are supported on Render free.
# ──────────────────────────────────────────────────────────────────────────
services:
  - type: web
    name: linkspan-signaling
    runtime: node
    plan: free
    region: oregon
    # Build from repo root so the `../../shared` import resolves.
    buildCommand: npm --prefix server ci --omit=dev
    startCommand: node server/src/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUSTED_PROXY_COUNT
        value: "1"

      # Rate limits — the defaults (5 sessions/hr, 10 conns/min per IP) are too
      # tight for an interactive demo where the sender creates a new session on
      # each Send/reload. Raise them to demo-friendly values. Still per-IP, so
      # this is not a DoS hole — just headroom for normal repeated use.
      - key: RL_MAX_SESSIONS_PER_HOUR
        value: "100"
      - key: RL_MAX_CONNECTIONS_PER_MIN
        value: "60"
      - key: RL_MAX_JOIN_ATTEMPTS_PER_MIN
        value: "60"

      # Relay-chunk frames (the WebSocket fallback transfer path) have their own,
      # separate rate-limit bucket from signaling/control messages — see
      # MAX_RELAY_CHUNKS_PER_SEC. The default (500/sec) is plenty; only raise this
      # if you're seeing RATE_LIMITED errors during a large relayed transfer.
      # - key: RL_MAX_RELAY_CHUNKS_PER_SEC
      #   value: "500"

      # Allow anonymous share-link creation (no API key). In production the
      # default is false, which makes the "Create a share link" UI fail with
      # "API key required". For a public portfolio demo we want anonymous use;
      # uploads are still size-capped and bounded by the 1 GB Supabase free tier.
      - key: API_ALLOW_ANONYMOUS
        value: "true"

      # Secrets — auto-generated, stable across restarts.
      - key: TOKEN_SECRET
        generateValue: true
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: METRICS_TOKEN
        generateValue: true

      # Fill these in the Render dashboard (sync:false = prompt, never committed).
      - key: CORS_ORIGIN          # https://your-app.vercel.app
        sync: false
      - key: PUBLIC_BASE_URL      # https://linkspan-signaling.onrender.com
        sync: false
      - key: SHARE_VIEW_URL       # https://your-app.vercel.app
        sync: false

      # Redis — Upstash Free (rediss:// TLS URL)
      - key: REDIS_URL
        sync: false

      # Ephemeral TURN credentials — Cloudflare Realtime TURN (free 1 TB/month, no
      # card). Create a TURN key in the Cloudflare dashboard (Realtime → TURN) and
      # fill these in; the server then mints short-lived credentials at
      # GET /api/v1/turn-credentials and the client no longer needs any VITE_TURN_*
      # static secret in its public bundle. Leave unset to run STUN-only (the app
      # still falls back to the WebSocket relay when direct P2P fails).
      - key: CLOUDFLARE_TURN_KEY_ID
        sync: false
      - key: CLOUDFLARE_TURN_API_TOKEN
        sync: false
      # No-card alternative (Cloudflare Realtime requires billing info to activate):
      # fixed credentials from ExpressTURN (free tier, email signup only) or any
      # static-cred TURN provider. Set all three; leave the Cloudflare pair unset.
      # - key: TURN_URLS          # e.g. turn:relay1.expressturn.com:3480
      #   sync: false
      # - key: TURN_USERNAME
      #   sync: false
      # - key: TURN_CREDENTIAL
      #   sync: false
      # Self-hosted alternative (coturn use-auth-secret): set TURN_STATIC_SECRET and
      # TURN_URLS (comma-separated turn:/turns: URLs) instead.
      # - key: TURN_STATIC_SECRET
      #   sync: false

      # Share-link blob storage — Supabase Storage (S3-compatible)
      - key: SHARE_STORAGE
        value: s3
      - key: S3_REGION
        value: ap-northeast-2
      - key: S3_PREFIX
        value: blobs/
      - key: S3_BUCKET
        sync: false             # e.g. linkspan-blobs
      - key: S3_ENDPOINT
        sync: false             # https://PROJECT_REF.supabase.co/storage/v1/s3
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false

      # Optional: persistent accounts via Supabase Postgres (see DEPLOYMENT.md).
      # - key: DATABASE_URL
      #   sync: false
