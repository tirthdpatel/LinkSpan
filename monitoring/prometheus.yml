global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: linkspan

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # configure alertmanager if needed

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # ── LinkSpan Signaling Server ────────────────────────────────
  - job_name: linkspan-signaling
    scrape_interval: 15s
    static_configs:
      - targets:
          - signaling:10000   # Docker Compose service name
    metrics_path: /metrics
    scheme: http

  # ── Redis ────────────────────────────────────────────────────
  # Uncomment if redis_exporter is added to docker-compose
  # - job_name: redis
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # ── Prometheus self-monitoring ───────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
