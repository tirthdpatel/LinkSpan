apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkspan-signaling
  namespace: linkspan
  labels:
    app.kubernetes.io/name: linkspan
    app.kubernetes.io/component: signaling
spec:
  replicas: 3
  selector:
    matchLabels:
      app: linkspan-signaling
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: linkspan-signaling
        app.kubernetes.io/component: signaling
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: signaling
          image: ghcr.io/linkspan/signaling:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 10000
              protocol: TCP
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: linkspan-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: linkspan-config
                  key: NODE_ENV
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: linkspan-config
                  key: CORS_ORIGIN
            - name: TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: linkspan-secrets
                  key: TOKEN_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: linkspan-secrets
                  key: REDIS_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: linkspan-secrets
                  key: DATABASE_URL
            - name: METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: linkspan-secrets
                  key: METRICS_TOKEN
            # ── Share links + REST API (Features 14/15/17) ──
            # Blob bytes on a ReadWriteMany volume so every replica serves every link;
            # metadata in Redis (already shared). For higher scale, swap the filesystem
            # backend for a cloud object store (implement the StorageBackend interface).
            - name: SHARE_STORAGE
              value: "filesystem"
            - name: SHARE_STORAGE_DIR
              value: "/data/blobs"
            - name: API_ALLOW_ANONYMOUS
              value: "false"
            - name: PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: linkspan-config
                  key: PUBLIC_BASE_URL
                  optional: true
            - name: SHARE_VIEW_URL
              valueFrom:
                configMapKeyRef:
                  name: linkspan-config
                  key: SHARE_VIEW_URL
                  optional: true
            - name: API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: linkspan-secrets
                  key: API_KEY_SECRET
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 10000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 10000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: blobs
              mountPath: /data/blobs
      volumes:
        - name: tmp
          emptyDir: {}
        - name: blobs
          persistentVolumeClaim:
            claimName: linkspan-blobs
      terminationGracePeriodSeconds: 30
