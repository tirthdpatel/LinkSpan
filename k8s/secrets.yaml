# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE ONLY — DO NOT COMMIT REAL VALUES
# Use Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets) or
# HashiCorp Vault to inject secrets at deploy time.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: linkspan-secrets
  namespace: linkspan
  labels:
    app.kubernetes.io/name: linkspan
  annotations:
    # Replace this whole file with a SealedSecret in production
    linkspan.app/secret-type: "template"
type: Opaque
stringData:
  # JWT/session token signing secret (min 64 chars, generate with: openssl rand -hex 32)
  TOKEN_SECRET: "REPLACE_ME_with_openssl_rand_hex_32"

  # Bearer token for /metrics and /stats endpoints (generate with: openssl rand -hex 24)
  # If not set, metrics are unrestricted (dev mode). Always set this in production.
  METRICS_TOKEN: "REPLACE_ME_with_openssl_rand_hex_24"

  # Redis connection URL (include auth if Redis requires password)
  REDIS_URL: "redis://:REPLACE_PASSWORD@redis:6379"

  # PostgreSQL connection URL (full DSN for Prisma)
  DATABASE_URL: "postgresql://linkspan:REPLACE_PASSWORD@postgres:5432/linkspan"

  # PostgreSQL password (standalone — used by the postgres pod's POSTGRES_PASSWORD env var)
  # Must match the password in DATABASE_URL above
  POSTGRES_PASSWORD: "REPLACE_PASSWORD"

  # Coturn long-term credential secret
  TURN_SECRET: "REPLACE_ME_with_openssl_rand_hex_32"
  TURN_USER: "linkspan"
