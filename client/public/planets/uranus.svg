<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="g" cx="35%" cy="35%"><stop offset="0%" stop-color="#b8e8f5"/><stop offset="50%" stop-color="#7ec8e3"/><stop offset="100%" stop-color="#3a7d99"/></radialGradient>
  </defs>
  <!-- Thin ring -->
