  <clipPath id="cp"><circle cx="50" cy="50" r="42"/></clipPath>
  <g clip-path="url(#cp)">
    <ellipse cx="50" cy="32" rx="40" ry="4" fill="rgba(180,230,245,.2)"/>
    <ellipse cx="50" cy="48" rx="38" ry="3" fill="rgba(160,215,235,.15)"/>
